<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Cutter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">Browser Video Tool</p>
        <h1>Video Cutter</h1>
        <p class="subtitle">Upload video, tentukan waktu mulai/akhir, lalu potong.</p>
      </header>

      <section class="card card-upload">
        <label for="videoFile">Pilih file video</label>
        <input id="videoFile" type="file" accept="video/*" />
        <button id="uploadBtn" class="btn-primary" type="button">Upload</button>
      </section>

      <section class="card card-editor">
        <video id="videoPreview" controls></video>
        <div class="timeline-wrap">
          <div id="timeline" class="timeline">
            <div id="selectedRange" class="selected-range"></div>
            <button id="handleA" class="handle handle-a" type="button">A</button>
            <button id="handleB" class="handle handle-b" type="button">B</button>
            <div id="playhead" class="playhead"></div>
          </div>
          <div class="timeline-labels">
            <span id="labelA">A: 0.00s</span>
            <span id="labelB">B: 0.00s</span>
          </div>
          <p class="hint">Seret marker A/B di timeline untuk menentukan awal dan akhir.</p>
        </div>
        <div class="grid">
          <div>
            <label for="startTime">Start (detik)</label>
            <input id="startTime" type="number" min="0" step="0.1" value="0" />
          </div>
          <div>
            <label for="endTime">End (detik)</label>
            <input id="endTime" type="number" min="0" step="0.1" value="10" />
          </div>
        </div>
        <button id="cutBtn" class="btn-accent" type="button">Cut Video</button>
      </section>

      <section class="card card-result">
        <h2>Hasil</h2>
        <a id="downloadLink" class="hidden" href="#" target="_blank" rel="noreferrer">Download hasil video</a>
        <p id="status"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
  </html>
